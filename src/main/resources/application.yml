spring:
  application:
    name: mock-nexus-auth-service

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    mongodb:
      uri: mongodb://admin:secret123@localhost:27017/datatable_db?authSource=admin
      database: datatable_db
server:
  port: ${PORT:8080}
